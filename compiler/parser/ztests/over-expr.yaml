script: |
  echo === aggregation and locals
  super compile -C 'collect(unnest a with b=c | ?d)'
  echo === cast
  super compile -C 'uint8(unnest a | ?b)'
  echo === expression
  super compile -C 'yield (unnest a | ?b)'
  echo === function
  super compile -C 'quiet(unnest a | ?b)'
  echo === grep
  super compile -C 'grep(/regexp/, unnest a | ?b)'

outputs:
  - name: stdout
    data: |
      === aggregation and locals
      aggregate
          collect((
            unnest a with b=c
            | search d
          ))
      === cast
      uint8((
        unnest a
        | search b
      ))
      === expression
      yield (
        unnest a
        | search b
      )
      === function
      quiet((
        unnest a
        | search b
      ))
      === grep
      where grep(/regexp/,(
          unnest a
          | search b
        ))
