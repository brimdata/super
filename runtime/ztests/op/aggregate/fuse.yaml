# Flat records
spq: fuse(this)

vector: true

input: |
  {a:"hello",b:"world"}
  {b:"goodnight",c:"gracie"}
  {a:"goodnight",b:123::int32}
  {a:null,b:null,c:null}

output: |
  <fusion({a?:fusion(string|null),b:fusion(int32|string|null),c?:fusion(string|null)})>

---

# Nested records
spq: fuse(this)

vector: true

input: |
  {a:"hello",r:{x:1::int32,y:2::int32}}
  {r:{y:4::int32,z:5::int32},s:"world",r2:{x:6::int32}}
  {a:null,r:{x:null,y:null,z:null},s:null,r2:null}

output: |
  <fusion({a?:fusion(string|null),r:fusion({x?:fusion(int32|null),y:fusion(int32|null),z?:fusion(int32|null)}),s?:fusion(string|null),r2?:fusion(null|{x:int32})})>

---

# Records with fixed-type field and variable-type field
spq: fuse(this)

vector: true

input: |
  {fixed:{x:1},var:{s:"foo"}}
  {fixed:{x:2},var:{s:"bar",a:[1,2]}}
  {fixed:{x:3},var:{s:"bar",a:[3]}}
  {fixed:{x:4},var:{s:"foo",t:123}}
  {fixed:{x:5},var:{s:"foo",t:{x:1}}}

output: |
  <{fixed:{x:int64},var:fusion({s:string,a?:[int64],t?:fusion(int64|{x:int64})})}>

---

# Arrays of records
spq: fuse(this)

vector: true

input: |
  [{a:1}]
  [{b:2}]
  [{a:3},{b:3}]
  [{a:3,b:3}]
  [{a:null,b:null}]

output: |
  <fusion([fusion({a?:fusion(int64|null),b?:fusion(int64|null)})])>

---

# Arrays of primitives
spq: fuse(this)

vector: true

input: |
  [1,2]
  ["foo"]
  [null]

output: |
  <fusion([fusion(int64|string|null)])>

---

# Arrays of primitives as record field
spq: fuse(this)

vector: true

input: |
  {a:[1,2]}
  {a:["foo"]}
  {a:[null]}

output: |
  <{a:fusion([fusion(int64|string|null)])}>

---

# Errors with error("missing")
spq: fuse(this)

vector: true

input: |
  error(1)
  error("missing")

output: |
  <fusion(error(fusion(int64|string)))>

---

# Errors with error("quiet")
spq: fuse(this)

vector: true

input: |
  error(1)
  error("quiet")

output: |
  <error(int64)>

---

# Named
spq: fuse(this)

vector: true

input: |
  1::=p1
  {a:1::=r1}::=r2
  [1::=a1]::=a2
  |[1::=s1]|::=s2
  |{1::=m1:2::=m2}|::=m3
  1::=u1::(u2=u1|(u3=string))
  "a"::(en1=enum(a,b))
  error(1::=er1)::=er2

output: |
  <fusion(int64|{a:r1=int64}|[a1=int64]||[s1=int64]|||{m1=int64:m2=int64}||enum(a,b)|error(er1=int64))>

---

# Mix of complex and primitive
spq: fuse(this)

vector: true

input: |
  {a:1}
  {a:"s"}
  1
  "s"
  [1]
  ["s"]

output: |
  <fusion(int64|string|{a:fusion(int64|string)}|[fusion(int64|string)])>

---

# Grouping key
spq: supertype:=fuse(this) by key | sort key

vector: true

input: |
  {a:"hello",r:{x:1::int32,y:2::int32},key:"a"}
  {a:"hello",r:{x:1::int32,y:2::int32},key:"b"}
  {a:"hello",r:{x:1::int32,y:2::int32},key:"c"}
  {r:{y:4::int32,z:5::int32},s:"world",r2:{x:6::int32},key:"a"}
  {r:{y:4::int32,z:5::int32},s:"world",r2:{x:6::int32},key:"b"}
  {r:{y:4::int32,z:5::int32},s:"world",r2:{x:6::int32},key:"c"}

output: |
  {key:"a",supertype:<fusion({a?:string,r:fusion({x?:int32,y:int32,z?:int32}),key:string,s?:string,r2?:{x:int32}})>}
  {key:"b",supertype:<fusion({a?:string,r:fusion({x?:int32,y:int32,z?:int32}),key:string,s?:string,r2?:{x:int32}})>}
  {key:"c",supertype:<fusion({a?:string,r:fusion({x?:int32,y:int32,z?:int32}),key:string,s?:string,r2?:{x:int32}})>}
