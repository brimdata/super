script: |
  super compile -C -I test.zed
  echo ===
  super compile -dag -C -I test.zed

inputs:
  - name: test.zed
    data: |
      // Expressions
      yield (unnest a | ?b)
      | yield (unnest a with b=c | ?d)
      | yield (unnest a, b with c=d, e=f | ?g)
      // Operators
      | unnest a
      | unnest a into ( ?b )
      | unnest a with b=c into ( ?d )
      | unnest a, b with c=d, e=f into ( ?g )

outputs:
  - name: stdout
    data: |
      yield (
        unnest a
        | search b
      )
      | yield (
        unnest a with b=c
        | search d
      )
      | yield (
        unnest a, b with c=d, e=f
        | search g
      )
      | unnest a
      | unnest a into (
        search b
      )
      | unnest a with b=c into (
        search d
      )
      | unnest a, b with c=d, e=f into (
        search g
      )
      ===
      null
      | yield (
        unnest a
        | where search("b")
      )
      | yield (
        unnest ab=c
        | where search("d")
      )
      | yield (
        unnest a, bc=d, e=f
        | where search("g")
      )
      | unnest a
      | unnest a into (
        where search("b")
      )
      | unnest a with b=c into (
        where search("d")
      )
      | unnest a, b with c=d, e=f into (
        where search("g")
      )
      | output main
