script: |
  source minio.sh
  zq -i parquet -f parquet -o s3://bucket/dns.parquet dns.parquet
  zq -z "count()" s3://bucket/dns.parquet

inputs:
  - name: minio.sh
    source: ../../../testdata/minio.sh
  - name: dns.parquet
    source: ../../../zio/parquetio/ztests/dns.parquet

outputs:
  - name: stdout
    data: |
      10(uint64)
