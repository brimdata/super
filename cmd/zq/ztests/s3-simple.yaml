script: |
  source minio.sh
  zq -f zson -o s3://bucket/babble.zson babble.zson
  zq -z "count()" s3://bucket/babble.zson

inputs:
  - name: babble.zson
    source: ../../../testdata/babble.zson
  - name: minio.sh
    source: ../../../testdata/minio.sh

outputs:
  - name: stdout
    data: |
      1000(uint64)
